name: rallye
description: App mobile para controle de aulas entre professor e aluno de esportes de raquete.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Backend
  supabase_flutter: ^2.9.1

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Error handling
  fpdart: ^1.1.0

  # Monitoring
  sentry_flutter: ^8.14.0

  # Navigation
  go_router: ^14.8.1

  # UI
  phosphor_flutter: ^2.1.0
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.5
  build_runner: ^2.4.15
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
